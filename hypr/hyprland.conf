
################
### MONITORS ###
################

# See https://wiki.hypr.land/Configuring/Monitors/
monitor=HDMI-A-2, 1920x1080@60, 0x0, 1.00

# Limpa os erros da image_01c686.png e aplica o efeito terminal
blurls = waybar
###################
### MY PROGRAMS ###
###################

# See https://wiki.hypr.land/Configuring/Keywords/

# Set programs that you use
$terminal = kitty
$menu = anyrun
$browser = zen-browser
$text_editor = obsidian
$coder =  kitty nvim

#################
### AUTOSTART ###
#################

exec-once = /usr/lib/polkit-kde-authentication-agent-1
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
exec-once = cliphist wipe 
exec-once = udiskie &
exec-once = waybar
exec-once = awww-daemon && sleep 0.5 && awww img "/home/flix/dotfiles/wallpapers/full-Balck.jpg"
#Ferramentas de Sistema e Cursor
exec-once = XDG_MENU_PREFIX=arch- kbuildsycoca6
exec-once = hyprctl setcursor Adwaita 27

###################
### PERMISSIONS ###
###################

#############################
### CURSOR & ENVIRONMENT  ###
#############################

exec-once = hyprctl setcursor Adwaita 27

env = XCURSOR_THEME,Adwaita
env = XCURSOR_SIZE,27
env = HYPRCURSOR_THEME,Adwaita
env = HYPRCURSOR_SIZE,27

env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland
env = MOZ_ENABLE_WAYLAND,1
env = ELECTRON_OZONE_PLATFORM_HINT, auto

env = GDK_BACKEND,wayland,x11,*
env = QT_QPA_PLATFORM,wayland;xcb
env = QT_QPA_PLATFORMTHEME,qt6ct
env = QT_AUTO_SCREEN_SCALE_FACTOR,1
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = _JAVA_AWT_WM_NONREPARENTING,1

#####################
### LOOK AND FEEL ###
#####################

general {
    gaps_in = 10
    gaps_out = 19

    border_size = 3
col.active_border   = rgba(B0B8C0ff) rgba(5A5A5Aaa) 45deg
    col.inactive_border = rgba(0D0D10aa)

}

decoration {
    rounding = 0
    active_opacity = 1.0
    inactive_opacity = 0.92

   shadow {
        enabled = false
        range = 20
        render_power = 4
	color = rgba(191919ee)
           }

    #blur
    blur {
        enabled = true
        size = 4 
        passes = 3
        new_optimizations = true
        vibrancy = 0.2
    }
}

# https://wiki.hypr.land/Configuring/Variables/#animations
animations {
    enabled = yes, please :)

    #        NAME,           X0,   Y0,   X1,   Y1
    bezier = easeOutQuint,   0.23, 1,    0.32, 1
    bezier = easeInOutCubic, 0.65, 0.05, 0.36, 1
    bezier = linear,         0,    0,    1,    1
    bezier = almostLinear,   0.5,  0.5,  0.75, 1
    bezier = quick,          0.15, 0,    0.1,  1

    #           NAME,          ONOFF, SPEED, CURVE,        [STYLE]
    animation = global,        1,     10,    default
    animation = border,        1,     5.39,  easeOutQuint
    animation = windows,       1,     3.79,  easeOutQuint
    animation = windowsIn,     1,     4.1,   easeOutQuint, popin 87%
    animation = windowsOut,    1,     1.49,  linear,       popin 87%
    animation = fadeIn,        1,     1.73,  almostLinear
    animation = fadeOut,       1,     1.46,  almostLinear
    animation = fade,          1,     3.03,  quick
    animation = layers,        1,     3.81,  easeOutQuint
    animation = layersIn,      1,     4,     easeOutQuint, fade
    animation = layersOut,     1,     1.5,   linear,       fade
    animation = fadeLayersIn,  1,     1.79,  almostLinear
    animation = fadeLayersOut, 1,     1.39,  almostLinear
    animation = workspaces,    1,     1.94,  almostLinear, fade
    animation = workspacesIn,  1,     1.21,  almostLinear, fade
    animation = workspacesOut, 1,     1.94,  almostLinear, fade
    animation = zoomFactor,    1,     7,     quick
}


dwindle {
    pseudotile = true 
    preserve_split = true 
}

master {
    new_status = master
}

misc {
    force_default_wallpaper = 0 
    disable_hyprland_logo = true
}


#############
### INPUT ###
#############

input {
    kb_layout = us
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =

    follow_mouse = 1

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.

    touchpad {
        natural_scroll = false
    }
}

# See https://wiki.hypr.land/Configuring/Gestures
gesture = 3, horizontal, workspace

# Example per-device config
# See https://wiki.hypr.land/Configuring/Keywords/#per-device-input-configs for more
device {
    name = epic-mouse-v1
    sensitivity = -0.5
}


###################
### KEYBINDINGS ###
###################


$mainMod = SUPER

bind =   $mainMod, T, exec, $terminal 
bind = $mainMod, G, togglegroup

# ── GROUPS ─────────────────────────────────────────
group {
    col.border_active   =rgba(B0B8C0ff) rgba(5A5A5Aaa) 45deg
    col.border_inactive =rgba(0D0D10aa)
    groupbar {
        font_family = JetBrainsMonoNerdFontPropo
        font_size   = 15
        gradients   = false
        col.active   = rgba(B0B8C0ff) rgba(5A5A5Aaa) 45deg
	col.inactive = rgba(0D0D10aa)
	}
}




# Mover para a próxima aba com Alt + Shift
bind = ALT, E, changegroupactive, f
# Mover para a aba anterior com Alt + Shift
bind = ALT, Q, changegroupactive, b
#--------------------
bind = alt,F4, killactive,

bind = $mainMod, F2, exit,

bind = $mainMod, Y, exec, $terminal -e yazi

bind = $mainMod, Z, togglefloating,

bind = $mainMod, SPACE, exec, $menu

bind = $mainMod, X, pseudo, # dwindle

bind = $mainMod, C, togglesplit, # dwindle

bind = $mainMod, F, fullscreen,1

bind = $mainMod SHIFT, F, fullscreen,

bind = $mainMod SHIFT, Z, exec, $browser
bind = ,Menu,exec, $coder
#--- hibernar
bind = , F1, exec, systemctl hibernate
#---
bind = , END, exec, systemctl poweroff
# Controle de Volume - F8 e F9
bind = , F8, exec, pamixer -d 5
bind = , F9, exec, pamixer -i 5


bind =, Super_R, exec, $text_editor

bind = , Print, exec, grimblast copysave area

# Monitor inteiro
bind = $mainMod, Print, exec, grimblast copysave output

# Janela activa
bind = $mainMod SHIFT, Print, exec, grimblast copysave active
bind = alt, V, exec, cliphist list | anyrun --plugins /etc/anyrun/plugins/libstdin.so | cliphist decode | wl-copy

# abrir waybar
bind = $mainMod, Escape, exec, killall waybar ||  waybar

# Move focus with mainMod + arrow keys
bind = $mainMod ,left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d
# Mover/Sobrepor janelas em todas as direções
bind = CTRL SHIFT, Up,    movewindow, u
bind = CTRL SHIFT, Down,  movewindow, d
bind = CTRL SHIFT, Left,  movewindow, l
bind = CTRL SHIFT, Right, movewindow, r

#----------
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Example special workspace (scratchpad)
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous
